<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="试用演示 · DemoGo">
  <title>试用演示 · DemoGo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF;
      --bg-section: #F5F5F7;
      --accent: #22C55E;
      --accent-hover: #16A34A;
      --accent-subtle: rgba(34,197,94,.08);
      --accent-border: rgba(34,197,94,.2);
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-tertiary: #86868B;
      --text-quaternary: #A1A1A6;
      --border: #D2D2D7;
      --border-light: #E8E8ED;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
      --radius-md: 18px;
      --radius-pill: 100px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Inter', sans-serif;
      --green: #22C55E;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-section);
      color: var(--text-primary);
      line-height: 1.47059;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex; flex-direction: column;
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    ::selection { background: rgba(34,197,94,.2); color: var(--text-primary); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    .bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px;
      background: rgba(255,255,255,.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid rgba(0,0,0,.06);
      flex-shrink: 0;
    }
    .bar-left { display: flex; align-items: center; gap: 12px; }
    .bar-logo {
      display: flex; align-items: center; gap: 4px;
      font-size: 15px; font-weight: 700; color: var(--text-primary); text-decoration: none;
    }
    .bar-logo .mark { color: var(--accent); font-size: 17px; }
    .bar-badge {
      font-size: 11px; padding: 3px 10px; border-radius: 10px;
      background: rgba(34,197,94,.1); color: var(--green); font-weight: 500;
    }
    .bar-name { font-size: 13px; color: var(--text-secondary); }
    .bar-right { display: flex; align-items: center; gap: 10px; }
    .bar-time { font-size: 12px; color: var(--text-tertiary); display: flex; align-items: center; gap: 4px; }
    .bar-btn {
      padding: 7px 16px; border-radius: var(--radius-pill);
      border: 1px solid var(--border); background: var(--bg);
      font-size: 12px; font-family: var(--font-sans); cursor: pointer;
      color: var(--text-secondary); transition: all .25s cubic-bezier(.25,0,.15,1);
    }
    .bar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .bar-btn.primary {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }
    .bar-btn.primary:hover { background: var(--accent-hover); }

    .content {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 40px 24px; overflow: auto;
    }
    .inner { width: 100%; max-width: 860px; }
    .preview {
      width: 100%; aspect-ratio: 16/10;
      background: var(--bg); border-radius: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      margin-bottom: 28px;
    }
    .preview .icon { font-size: 48px; opacity: .2; }
    .preview .hint { font-size: 15px; color: var(--text-tertiary); font-weight: 500; }

    .feedback {
      max-width: 500px; margin: 0 auto;
      background: var(--bg); border-radius: var(--radius-md);
      box-shadow: var(--shadow-md); border: 1px solid var(--border-light);
      padding: 36px;
    }
    .feedback h3 { font-size: 17px; font-weight: 600; margin-bottom: 4px; }
    .feedback .sub { font-size: 13px; color: var(--text-tertiary); margin-bottom: 20px; }

    .fb-type { display: flex; gap: 8px; margin-bottom: 16px; }
    .fb-type label {
      flex: 1; text-align: center; padding: 8px;
      border: 1px solid var(--border); border-radius: 12px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary); transition: all .2s;
    }
    .fb-type label:has(input:checked) { border-color: var(--accent-border); background: var(--accent-subtle); }
    .fb-type input:checked + span { color: var(--accent); font-weight: 500; }
    .fb-type input { display: none; }

    textarea {
      width: 100%; padding: 12px 16px; border: 1px solid var(--border-light);
      border-radius: 14px; font-size: 14px; font-family: var(--font-sans);
      min-height: 80px; resize: vertical; outline: none; margin-bottom: 14px;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-quaternary); }

    .fb-submit {
      width: 100%; padding: 12px; border-radius: var(--radius-pill);
      background: var(--accent); color: #fff; border: none;
      font-size: 14px; font-weight: 600; cursor: pointer;
      font-family: var(--font-sans); transition: all .3s cubic-bezier(.25,0,.15,1);
    }
    .fb-submit:hover { background: var(--accent-hover); }
    .fb-footer { display: flex; justify-content: space-between; margin-top: 14px; font-size: 12px; color: var(--text-quaternary); }

    @media (max-width: 768px) {
      .bar { flex-wrap: wrap; gap: 6px; padding: 10px 16px; }
      .bar-name { display: none; }
      .content { padding: 24px 16px; }
      .feedback { padding: 24px 20px; }
      .fb-type { flex-wrap: wrap; }
      .fb-type label { flex: none; width: calc(50% - 4px); }
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="bar-left">
      <a href="#" class="bar-logo"><span class="mark">◆</span>DemoGo</a>
      <span class="bar-badge">试用演示</span>
      <span class="bar-name">/ 产品落地页 v2 · 李婷</span>
    </div>
    <div class="bar-right">
      <span class="bar-time">● 剩余 23 小时</span>
      <button class="bar-btn">📋 复制链接</button>
      <button class="bar-btn primary">💬 提供反馈</button>
    </div>
  </div>
  <div class="content">
    <div class="inner">
      <div class="preview">
        <div class="icon" aria-hidden="true">🖥️</div>
        <div class="hint">你的项目正在这里运行</div>
        <div class="hint" style="font-size:13px;">产品落地页 v2 · 实时演示</div>
      </div>
      <div class="feedback">
        <h3>留下你的反馈</h3>
        <p class="sub">你的意见将直接发送给作品创建者</p>
        <div class="fb-type">
          <label><input type="radio" name="fb" checked><span>👍 很赞</span></label>
          <label><input type="radio" name="fb"><span>💡 建议</span></label>
          <label><input type="radio" name="fb"><span>🐛 Bug</span></label>
          <label><input type="radio" name="fb"><span>❓ 问题</span></label>
        </div>
        <textarea placeholder="说说你的感受..."></textarea>
        <button class="fb-submit">发送反馈</button>
        <div class="fb-footer">
          <span>已收集 15 条反馈</span>
          <span>DemoGo 提供技术支持</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
