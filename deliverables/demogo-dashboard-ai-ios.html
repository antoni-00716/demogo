<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DemoGo AI 发布">
  <title>AI 发布 · DemoGo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF;
      --bg-section: #F5F5F7;
      --accent: #22C55E;
      --accent-hover: #16A34A;
      --accent-subtle: rgba(34,197,94,.08);
      --accent-border: rgba(34,197,94,.2);
      --text-primary: #1D1D1F;
      --text-secondary: #6E6E73;
      --text-tertiary: #86868B;
      --text-quaternary: #A1A1A6;
      --border: #D2D2D7;
      --border-light: #E8E8ED;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
      --shadow-green: 0 4px 20px rgba(34,197,94,.1);
      --radius-md: 18px;
      --radius-pill: 100px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', 'Inter', sans-serif;
      --green: #22C55E;
    }
    html { font-size: 16px; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-section);
      color: var(--text-primary);
      line-height: 1.47059;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
    }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    ::selection { background: rgba(34,197,94,.2); color: var(--text-primary); }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }

    .dash { display: flex; min-height: 100vh; }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width: 240px; background: var(--bg);
      border-right: 1px solid var(--border);
      padding: 24px 20px; display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
    }
    .sidebar-logo {
      display: flex; align-items: center; gap: 6px;
      font-size: 16px; font-weight: 700; margin-bottom: 32px;
    }
    .sidebar-logo .mark { color: var(--accent); font-size: 18px; }
    .sidebar-nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      font-size: 14px; color: var(--text-secondary); text-decoration: none;
      transition: all .2s cubic-bezier(.25,0,.15,1);
    }
    .nav-item:hover { background: var(--bg-section); color: var(--text-primary); }
    .nav-item.active { background: var(--accent-subtle); color: var(--accent); font-weight: 500; }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 8px 0; margin-top: 12px;
      border-top: 1px solid var(--border);
    }
    .sidebar-avatar {
      width: 32px; height: 32px; border-radius: 16px;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600;
    }
    .sidebar-user-info { flex: 1; }
    .sidebar-user-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .sidebar-user-role { font-size: 11px; color: var(--text-tertiary); }

    /* ===== MAIN ===== */
    .main { flex: 1; padding: 36px 48px; min-width: 0; }

    .main-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px;
    }
    .main-header h1 {
      font-size: 24px; font-weight: 700; letter-spacing: -.015em;
    }
    .main-header .sub { font-size: 14px; color: var(--text-secondary); margin-top: 2px; }

    .btn-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 10px 22px; border-radius: var(--radius-pill);
      background: var(--accent); color: #fff;
      font-size: 14px; font-weight: 600; text-decoration: none; border: none; cursor: pointer;
      font-family: var(--font-sans);
      transition: all .3s cubic-bezier(.25,0,.15,1);
    }
    .btn-pill:hover { background: var(--accent-hover); }
    .btn-pill:active { transform: scale(.97); }

    .ai-card {
      background: var(--bg); border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
      padding: 32px; max-width: 680px; margin-bottom: 32px;
    }
    .ai-textarea {
      width: 100%; min-height: 140px; resize: vertical;
      padding: 16px; border: 1px solid var(--border); border-radius: 12px;
      background: var(--bg-section); font-size: 14px; font-family: var(--font-sans);
      color: var(--text-primary); outline: none; line-height: 1.6;
      transition: all .25s cubic-bezier(.25,0,.15,1);
    }
    .ai-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-subtle); }
    .ai-textarea::placeholder { color: var(--text-quaternary); }
    .ai-hint { font-size: 13px; color: var(--text-tertiary); margin-top: 8px; }
    .ai-actions { margin-top: 16px; display: flex; gap: 12px; align-items: center; }

    .section-hdr {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
    }
    .section-hdr h2 { font-size: 17px; font-weight: 600; }

    .ai-list { display: flex; flex-direction: column; gap: 8px; }
    .ai-row {
      display: flex; align-items: center; gap: 14px;
      padding: 18px 24px;
      background: var(--bg); border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);
      transition: all .35s cubic-bezier(.25,0,.15,1);
    }
    .ai-row:hover { border-color: var(--accent-border); box-shadow: var(--shadow-green); }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ai-dot.online { background: var(--green); }
    .ai-dot.offline { background: var(--border); }
    .ai-info { flex: 1; }
    .ai-name { font-size: 15px; font-weight: 600; }
    .ai-meta { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
    .ai-views { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
    .ai-btn {
      padding: 6px 14px; border-radius: var(--radius-pill);
      border: 1px solid var(--border); background: none;
      font-size: 12px; font-family: var(--font-sans); cursor: pointer;
      color: var(--text-secondary);
      transition: all .25s cubic-bezier(.25,0,.15,1);
    }
    .ai-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { padding: 24px; }
      .ai-card { max-width: 100%; }
    }
    @media (max-width: 600px) {
      .main-header { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>
  <div class="dash">
    <aside class="sidebar">
      <div class="sidebar-logo"><span class="mark">◆</span>DemoGo</div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item"><span aria-hidden="true">📊</span>总览</a>
        <a href="#" class="nav-item"><span aria-hidden="true">📁</span>我的作品</a>
        <a href="#" class="nav-item"><span aria-hidden="true">⬆️</span>上传发布</a>
        <a href="#" class="nav-item active"><span aria-hidden="true">🤖</span>AI 发布</a>
        <a href="#" class="nav-item"><span aria-hidden="true">📋</span>发布记录</a>
        <a href="#" class="nav-item"><span aria-hidden="true">💬</span>反馈收集</a>
        <a href="#" class="nav-item"><span aria-hidden="true">📦</span>套餐额度</a>
      </nav>
      <div class="sidebar-user">
        <div class="sidebar-avatar">W</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name">wang@email.com</div>
          <div class="sidebar-user-role">免费版 · 剩余 3 次</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="main-header">
        <div>
          <h1>AI 发布</h1>
          <p class="sub">输入描述，AI 自动生成演示页面并发布</p>
        </div>
      </div>

      <div class="ai-card">
        <label class="form-label" for="ai-prompt" style="font-size:13px;font-weight:600;display:block;margin-bottom:8px;">描述你的页面需求</label>
        <textarea class="ai-textarea" id="ai-prompt" placeholder="例如：创建一个简洁的 SaaS 产品落地页，包含头部导航、功能介绍、定价表格和页脚..."></textarea>
        <div class="ai-hint">AI 将根据你的描述生成 HTML 页面并自动发布，每次消耗 1 次发布额度</div>
        <div class="ai-actions">
          <button class="btn-pill"><span aria-hidden="true">✨</span> 生成并发布</button>
        </div>
      </div>

      <div class="section-hdr"><h2>最近 AI 生成作品</h2></div>
      <div class="ai-list">
        <div class="ai-row">
          <span class="ai-dot online"></span>
          <div class="ai-info">
            <div class="ai-name">SaaS 产品落地页</div>
            <div class="ai-meta">AI 生成 · 今天 14:23</div>
          </div>
          <div class="ai-views"><span aria-hidden="true">👁️</span> 45</div>
          <button class="ai-btn">查看</button>
          <button class="ai-btn">重新生成</button>
        </div>
        <div class="ai-row">
          <span class="ai-dot online"></span>
          <div class="ai-info">
            <div class="ai-name">个人简历页</div>
            <div class="ai-meta">AI 生成 · 昨天 09:15</div>
          </div>
          <div class="ai-views"><span aria-hidden="true">👁️</span> 128</div>
          <button class="ai-btn">查看</button>
          <button class="ai-btn">重新生成</button>
        </div>
        <div class="ai-row">
          <span class="ai-dot online"></span>
          <div class="ai-info">
            <div class="ai-name">电商促销活动页</div>
            <div class="ai-meta">AI 生成 · 3 天前</div>
          </div>
          <div class="ai-views"><span aria-hidden="true">👁️</span> 312</div>
          <button class="ai-btn">查看</button>
          <button class="ai-btn">重新生成</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
