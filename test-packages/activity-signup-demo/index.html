<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DemoGo 报名表单测试页</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #f4f7f8;
      color: #14242a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 36px;
      align-items: center;
      max-width: 1120px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .hero h1 {
      margin: 0 0 16px;
      font-size: 46px;
      line-height: 1.16;
    }

    .hero p {
      max-width: 620px;
      margin: 0 0 22px;
      color: #556970;
      font-size: 18px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .meta span {
      padding: 8px 12px;
      border: 1px solid #d8e3e6;
      border-radius: 8px;
      background: #fff;
      color: #43565c;
      font-size: 14px;
      font-weight: 700;
    }

    .form-panel {
      background: #fff;
      border: 1px solid #d8e3e6;
      border-radius: 8px;
      box-shadow: 0 16px 42px rgba(14, 36, 43, 0.1);
      padding: 24px;
    }

    .form-panel h2 {
      margin: 0 0 16px;
      font-size: 22px;
    }

    label {
      display: block;
      margin-bottom: 14px;
      color: #40545a;
      font-size: 14px;
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      margin-top: 6px;
      padding: 11px 12px;
      border: 1px solid #cbd9dd;
      border-radius: 8px;
      color: #14242a;
      font: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      background: #0d947d;
      color: #fff;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .notice {
      min-height: 24px;
      margin-top: 12px;
      color: #0d947d;
      font-weight: 750;
    }

    @media (max-width: 860px) {
      .page {
        grid-template-columns: 1fr;
        padding: 32px 16px;
      }

      .hero h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <h1>2026 AI 产品试用报名会</h1>
      <p>这是一个 DemoGo v0.1.7 验收测试页面，用来验证报名表单字段识别、本地 API 风险提示和规则体检报告。</p>
      <div class="meta">
        <span>活动报名</span>
        <span>表单字段识别</span>
        <span>本地 API 风险检测</span>
      </div>
    </section>

    <section class="form-panel">
      <h2>提交报名信息</h2>
      <form id="signupForm">
        <label>
          姓名
          <input name="name" placeholder="请输入姓名" required>
        </label>
        <label>
          手机号
          <input name="phone" type="tel" placeholder="请输入手机号" required>
        </label>
        <label>
          公司
          <input name="company" placeholder="请输入公司名称">
        </label>
        <label>
          参会人数
          <select name="attendeeCount">
            <option value="1">1 人</option>
            <option value="2">2 人</option>
            <option value="3">3 人及以上</option>
          </select>
        </label>
        <label>
          备注
          <textarea name="message" placeholder="请填写关注方向或其他说明"></textarea>
        </label>
        <button type="submit">提交报名</button>
        <div class="notice" id="notice"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("signupForm");
    const notice = document.getElementById("notice");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(form).entries());

      try {
        await fetch("/api/register", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data)
        });
        notice.textContent = "报名信息已提交。";
      } catch {
        notice.textContent = "当前页面调用了本地 API，DemoGo 应提示该接口发布后可能不可用。";
      }
    });
  </script>
</body>
</html>
