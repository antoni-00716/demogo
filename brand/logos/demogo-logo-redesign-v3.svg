<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .page { fill: #f4f6f9; }
      .card { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; }
      .title { font: 700 28px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .desc { font: 400 18px Arial, sans-serif; fill: #64748b; letter-spacing: 0; }
      .word { font: 800 52px Arial, sans-serif; fill: #0f172a; letter-spacing: 0; }
      .word-light { font: 800 52px Arial, sans-serif; fill: #ffffff; letter-spacing: 0; }
      .small { font: 600 18px Arial, sans-serif; fill: #475569; letter-spacing: 0; }
      .ink { fill: #0f172a; }
      .blue { fill: #2563eb; }
      .green { fill: #16a34a; }
      .teal { fill: #0d9488; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-ink { stroke: #0f172a; }
      .line-blue { stroke: #2563eb; }
      .line-green { stroke: #16a34a; }
      .line-white { stroke: #ffffff; }
      .muted { fill: #e8eef7; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect class="page" width="1800" height="1200"/>

  <g transform="translate(72 64)">
    <text x="0" y="0" class="title">DemoGo Logo Redesign</text>
    <text x="0" y="34" class="desc">更像品牌标识，而不是功能说明图标。核心表达：AI 项目变成可访问、可分享、可验证的测试链接。</text>
  </g>

  <g transform="translate(70 130)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">A. Link Launch</text>
    <text class="desc" x="36" y="88">链接 + 启动，保留速度感但更克制</text>
    <g transform="translate(170 126)">
      <rect x="0" y="0" width="180" height="180" rx="46" class="ink"/>
      <path d="M58 106h-8c-22 0-40-18-40-40s18-40 40-40h36" class="line line-white" stroke-width="18"/>
      <path d="M92 74h38c22 0 40 18 40 40s-18 40-40 40h-8" class="line line-white" stroke-width="18"/>
      <path d="M68 126L126 68" class="line line-blue" stroke-width="18"/>
      <path d="M132 44l36 10 10 36" class="line line-green" stroke-width="14"/>
    </g>
    <g transform="translate(121 350)">
      <text class="word" x="0" y="0">Demo</text>
      <text class="word" x="156" y="0" fill="#2563eb">Go</text>
    </g>
  </g>

  <g transform="translate(640 130)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">B. Demo Portal</text>
    <text class="desc" x="36" y="88">更产品化：一个被打开的演示入口</text>
    <g transform="translate(166 132)">
      <rect x="0" y="20" width="188" height="140" rx="34" fill="#ffffff" stroke="#0f172a" stroke-width="14"/>
      <path d="M34 62h68" class="line line-ink" stroke-width="11"/>
      <path d="M34 96h92" class="line line-ink" stroke-width="11"/>
      <path d="M34 130h54" class="line line-ink" stroke-width="11"/>
      <path d="M122 96h96" class="line line-blue" stroke-width="17"/>
      <path d="M184 58l42 38-42 38" class="line line-blue" stroke-width="17"/>
      <circle cx="154" cy="20" r="15" class="green"/>
    </g>
    <g transform="translate(121 350)">
      <text class="word" x="0" y="0">Demo</text>
      <text class="word" x="156" y="0" fill="#16a34a">Go</text>
    </g>
  </g>

  <g transform="translate(1210 130)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">C. Go Mark</text>
    <text class="desc" x="36" y="88">最像长期品牌：少解释，但更高级</text>
    <g transform="translate(166 126)">
      <circle cx="90" cy="90" r="90" class="ink"/>
      <path d="M116 54H78c-30 0-54 24-54 54s24 54 54 54h22c34 0 60-26 60-60" class="line line-white" stroke-width="20"/>
      <path d="M94 102h76" class="line line-blue" stroke-width="20"/>
      <path d="M140 70l34 32-34 32" class="line line-green" stroke-width="18"/>
    </g>
    <g transform="translate(121 350)">
      <text class="word" x="0" y="0">Demo</text>
      <text class="word" x="156" y="0" fill="#0f172a">Go</text>
    </g>
  </g>

  <g transform="translate(70 650)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">D. D Link</text>
    <text class="desc" x="36" y="88">用 D 做记忆点，适合 favicon 和头像</text>
    <g transform="translate(158 126)">
      <rect x="0" y="0" width="204" height="180" rx="48" fill="#f8fafc" stroke="#0f172a" stroke-width="14"/>
      <path d="M58 48h46c38 0 64 26 64 42s-26 42-64 42H58z" fill="#0f172a"/>
      <path d="M82 74h28c18 0 30 8 30 16s-12 16-30 16H82z" fill="#ffffff"/>
      <path d="M112 90h92" class="line line-blue" stroke-width="17"/>
      <path d="M172 54l42 36-42 36" class="line line-blue" stroke-width="17"/>
      <circle cx="44" cy="148" r="14" class="green"/>
    </g>
    <g transform="translate(121 350)">
      <text class="word" x="0" y="0">Demo</text>
      <text class="word" x="156" y="0" fill="#2563eb">Go</text>
    </g>
  </g>

  <g transform="translate(640 650)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">E. Wordmark First</text>
    <text class="desc" x="36" y="88">最稳妥：字标优先，符号做辅助</text>
    <g transform="translate(112 154)">
      <text class="word" x="0" y="74">Demo</text>
      <text class="word" x="156" y="74" fill="#2563eb">Go</text>
      <path d="M314 54h66" class="line line-blue" stroke-width="14"/>
      <path d="M354 28l30 26-30 26" class="line line-blue" stroke-width="14"/>
      <circle cx="300" cy="54" r="12" class="green"/>
    </g>
    <g transform="translate(124 330)">
      <rect x="0" y="0" width="270" height="54" rx="27" fill="#0f172a"/>
      <text x="24" y="37" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">demo link ready</text>
    </g>
  </g>

  <g transform="translate(1210 650)">
    <rect class="card" width="520" height="450" rx="26" filter="url(#softShadow)"/>
    <text class="title" x="36" y="54">建议</text>
    <text class="desc" x="36" y="108">如果要做成真正品牌，我建议先从 A / B / E 里定。</text>
    <text class="desc" x="36" y="152">A：最有记忆点，适合早期传播。</text>
    <text class="desc" x="36" y="196">B：最符合产品本质，适合官网和产品界面。</text>
    <text class="desc" x="36" y="240">E：最稳，不容易过时，也最像 SaaS 品牌。</text>
    <text class="desc" x="36" y="296">我不建议继续做复杂图形。</text>
    <text class="desc" x="36" y="340">Logo 应该先简单、清楚、可长期使用。</text>
  </g>
</svg>
