<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100">
  <defs>
    <style>
      :root {
        --ink: #0b1020;
        --muted: #667085;
        --line: #e6e9ef;
        --panel: #ffffff;
        --soft: #f7f8fb;
        --brand: #4f46e5;
        --brand-soft: #818cf8;
        --night: #18182c;
      }
      .page { fill: #f3f4f6; }
      .panel { fill: var(--panel); }
      .soft { fill: var(--soft); }
      .night { fill: var(--night); }
      .line { stroke: var(--line); stroke-width: 1; fill: none; }
      .label { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--ink); letter-spacing: 0; }
      .small { font: 500 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--muted); letter-spacing: 0; }
      .word { font: 780 58px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--ink); letter-spacing: -1px; }
      .word-white { font: 780 58px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: -1px; }
      .word-sm { font: 760 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: var(--ink); letter-spacing: -0.3px; }
      .word-sm-white { font: 760 25px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; letter-spacing: -0.3px; }
      .brand { fill: var(--brand); }
      .brand-soft { fill: var(--brand-soft); }
    </style>

    <symbol id="demogo-mark" viewBox="0 0 96 96">
      <path d="M18 14h34l30 34-30 34H18z" class="brand"/>
      <path d="M52 14l30 34-30 34H36l30-34-30-34z" class="brand-soft" opacity="0.92"/>
    </symbol>

    <symbol id="demogo-mark-solid" viewBox="0 0 96 96">
      <path d="M18 14h34l30 34-30 34H18z" class="brand"/>
    </symbol>

    <symbol id="demogo-mark-white" viewBox="0 0 96 96">
      <path d="M18 14h34l30 34-30 34H18z" fill="#818cf8"/>
    </symbol>
  </defs>

  <rect class="page" width="1600" height="1100"/>

  <g transform="translate(34 24)">
    <rect class="panel" width="1532" height="1044" rx="32"/>

    <g transform="translate(90 72)">
      <text class="label" x="0" y="0">DemoGo Brand Logo - Refined Direction</text>
      <line class="line" x1="0" y1="26" x2="1352" y2="26"/>
    </g>

    <g transform="translate(90 122)">
      <rect class="soft" width="1352" height="240" rx="20"/>
      <g transform="translate(416 76)">
        <use href="#demogo-mark" width="96" height="96"/>
        <text class="word" x="130" y="68">DemoGo</text>
      </g>
    </g>

    <g transform="translate(90 400)">
      <rect class="night" width="1352" height="240" rx="20"/>
      <g transform="translate(416 76)">
        <use href="#demogo-mark-white" width="96" height="96"/>
        <text class="word-white" x="130" y="68">DemoGo</text>
      </g>
    </g>

    <g transform="translate(90 698)">
      <text class="label" x="0" y="0">使用场景</text>

      <g transform="translate(0 38)">
        <rect class="panel" width="420" height="140" rx="18" stroke="#eceff4"/>
        <text class="small" x="28" y="40">网站导航栏</text>
        <g transform="translate(28 70)">
          <use href="#demogo-mark-solid" width="34" height="34"/>
          <text class="word-sm" x="48" y="26">DemoGo</text>
        </g>
      </g>

      <g transform="translate(456 38)">
        <rect class="panel" width="420" height="140" rx="18" stroke="#eceff4"/>
        <text class="small" x="28" y="40">浏览器标签页 / Favicon</text>
        <g transform="translate(28 74)">
          <use href="#demogo-mark-solid" width="22" height="22"/>
          <text x="42" y="18" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="17" fill="#344054">DemoGo - 首页</text>
        </g>
      </g>

      <g transform="translate(912 38)">
        <rect class="panel" width="440" height="140" rx="18" stroke="#eceff4"/>
        <text class="small" x="28" y="40">独立 App 图标</text>
        <g transform="translate(28 68)">
          <rect width="58" height="58" rx="16" class="brand"/>
          <path d="M18 14h20l18 15-18 15H18z" fill="#ffffff"/>
        </g>
      </g>

      <g transform="translate(0 208)">
        <rect class="night" width="420" height="118" rx="14"/>
        <g transform="translate(28 42)">
          <use href="#demogo-mark-white" width="36" height="36"/>
          <text class="word-sm-white" x="52" y="27">DemoGo</text>
        </g>
      </g>

      <g transform="translate(456 208)">
        <rect class="panel" width="420" height="118" rx="14" stroke="#eceff4"/>
        <g transform="translate(28 42)">
          <use href="#demogo-mark-solid" width="36" height="36"/>
          <text class="word-sm" x="52" y="27">DemoGo</text>
        </g>
      </g>

      <g transform="translate(912 208)">
        <rect class="panel" width="440" height="118" rx="14" stroke="#eceff4"/>
        <text class="small" x="28" y="44">建议作为主方案继续细化</text>
        <text x="28" y="76" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" fill="#475467">符号表达：D + forward / go + link entry</text>
      </g>
    </g>
  </g>
</svg>
