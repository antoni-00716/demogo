# DemoGo v0.9.30 - Nginx proxy cache configuration
# Include this in your Nginx server block for CDN-like caching.
# File: /etc/nginx/snippets/demogo-cache.conf

# Define cache zone (10m = ~80,000 keys, 1g = 1GB disk cache)
proxy_cache_path /var/cache/nginx/demogo levels=1:2 keys_zone=demogo_cache:10m max_size=1g inactive=60m use_temp_path=off;

# Cache purge support
proxy_cache_purge demogo_cache $scheme$host$request_uri;

# Upstream to DemoGo server
upstream demogo_backend {
    server 127.0.0.1:3001;
}

# Inside your server { block }, add:

# Demo static content - cached
location /d/ {
    # Proxy to Express (which serves static files or redirects to Nginx)
    # If Nginx serves static files directly, use the "try_files" variant below
    
    # Option A: Nginx serves static files directly (fastest)
    root /var/www/demogo-preview;
    try_files $uri @demogo_fallback;
    
    # Cache headers
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf|eot)$ {
        root /var/www/demogo-preview;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "HIT";
    }
    
    location ~* \.html$ {
        root /var/www/demogo-preview;
        expires 5m;
        add_header Cache-Control "public, must-revalidate";
        add_header X-Cache-Status "HIT";
    }
}

# Fallback to Express for SPA routing, runtime demos, etc.
location @demogo_fallback {
    proxy_pass http://demogo_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Cache control from upstream
    proxy_cache demogo_cache;
    proxy_cache_key "$scheme$host$request_uri";
    proxy_cache_valid 200 5m;
    proxy_cache_valid 404 1m;
    proxy_cache_bypass $http_pragma $http_authorization;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    add_header X-Cache-Status $upstream_cache_status;
    
    # Allow PURGE method for cache invalidation
    limit_except GET HEAD POST {
        deny all;
    }
}

# API - never cache
location /api/ {
    proxy_pass http://demogo_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_no_cache 1;
    add_header Cache-Control "no-store";
}
