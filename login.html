<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录 / 注册 - DemoGo</title>
  <style>
    :root {
      --ink: #14242a;
      --muted: #607278;
      --soft: #f4f7f8;
      --line: #d8e3e6;
      --teal: #0d947d;
      --blue: #255f9a;
      --orange: #d86b25;
      --shadow: 0 18px 48px rgba(14, 36, 43, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(244, 247, 248, 1) 0%, rgba(244, 247, 248, 0.92) 52%, rgba(244, 247, 248, 0.62) 100%),
        url("assets/demogo-hero.png");
      background-size: cover;
      background-position: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.6;
    }

    a { color: inherit; text-decoration: none; }

    .wrap {
      width: min(1080px, calc(100vw - 40px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(360px, 0.48fr);
      gap: 44px;
      align-items: center;
      padding: 42px 0;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      font-weight: 850;
      margin-bottom: 34px;
    }

    .mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      color: #fff;
      font-size: 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(38px, 5vw, 62px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .lead {
      max-width: 620px;
      margin: 0;
      color: #445a61;
      font-size: 19px;
      line-height: 1.8;
    }

    .points {
      display: grid;
      gap: 12px;
      margin-top: 28px;
      color: var(--muted);
      font-weight: 700;
    }

    .points span {
      display: inline-flex;
      width: fit-content;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
    }

    .card {
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 22px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--soft);
    }

    .tab {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .tab.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 6px 18px rgba(14, 36, 43, 0.08);
    }

    label {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
      color: #3f5359;
      font-size: 13px;
      font-weight: 850;
    }

    input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font: inherit;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 44px;
      padding: 0 16px;
      border: 1px solid var(--teal);
      border-radius: 8px;
      background: var(--teal);
      color: #fff;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    .message {
      min-height: 22px;
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .back {
      display: inline-flex;
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 750;
    }

    @media (max-width: 860px) {
      .wrap {
        grid-template-columns: 1fr;
        align-items: start;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <a class="brand" href="index.html">
        <span class="mark">Go</span>
        <span>DemoGo</span>
      </a>
      <h1>登录后，发布你的第一个 AI Demo。</h1>
      <p class="lead">上传 AI 编程工具生成的小产品，生成一个可发给客户、同事或老师的试用链接。DemoGo 会把发布记录绑定到你的账号。</p>
      <div class="points">
        <span>免费体验：1 个在线 Demo</span>
        <span>支持 zip 上传和 /d/{slug} 链接</span>
        <span>后续接入 AI 工具内一句话发布</span>
      </div>
    </section>

    <section class="card">
      <div class="tabs">
        <button class="tab active" id="loginTab" type="button">登录</button>
        <button class="tab" id="registerTab" type="button">注册</button>
      </div>
      <form id="authForm">
        <label>
          邮箱
          <input id="email" type="email" autocomplete="email" placeholder="you@example.com">
        </label>
        <label>
          密码
          <input id="password" type="password" autocomplete="current-password" placeholder="至少 8 位">
        </label>
        <button class="btn" id="submitButton" type="submit">登录</button>
      </form>
      <p class="message" id="message">内测阶段使用邮箱和密码登录。</p>
      <a class="back" href="index.html">返回官网</a>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const next = safeNext(params.get("next"));
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const submitButton = document.getElementById("submitButton");
    const message = document.getElementById("message");
    const authForm = document.getElementById("authForm");
    let mode = "login";

    loginTab.addEventListener("click", () => setMode("login"));
    registerTab.addEventListener("click", () => setMode("register"));

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || password.length < 8) {
        message.textContent = "请输入邮箱和至少 8 位密码。";
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = mode === "login" ? "登录中..." : "注册中...";
      message.textContent = "";

      try {
        const response = await fetch(`/api/auth/${mode}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || "操作失败");
        }

        window.location.href = next;
      } catch (error) {
        message.textContent = error.message || "操作失败，请稍后重试。";
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = mode === "login" ? "登录" : "注册";
      }
    });

    function setMode(nextMode) {
      mode = nextMode;
      loginTab.classList.toggle("active", mode === "login");
      registerTab.classList.toggle("active", mode === "register");
      submitButton.textContent = mode === "login" ? "登录" : "注册并进入控制台";
      message.textContent = mode === "login" ? "内测阶段使用邮箱和密码登录。" : "注册后会自动进入用户控制台。";
    }

    function safeNext(value) {
      const fallback = "app.html";
      if (!value) return fallback;
      const trimmed = String(value).trim();
      if (/^https?:\/\//i.test(trimmed) || trimmed.startsWith("//")) return fallback;
      if (trimmed.startsWith("/") && !trimmed.startsWith("/app.html")) return fallback;
      if (!/^(app\.html|admin\.html)(#.*|\?.*)?$/.test(trimmed) && !trimmed.startsWith("app.html#")) return fallback;
      return trimmed;
    }
  </script>
</body>
</html>
