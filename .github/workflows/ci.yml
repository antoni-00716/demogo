name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm run check
        working-directory: server

  server-test:
    runs-on: ubuntu-latest
    needs: server-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm run test
        working-directory: server

  web-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-build:
    runs-on: ubuntu-latest
    needs: web-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  version-check:
    runs-on: ubuntu-latest
    needs: [server-test, web-build]
    steps:
      - uses: actions/checkout@v4
      - name: Check version consistency
        run: |
          ROOT_VERSION=$(cat VERSION)
          echo "VERSION: ${ROOT_VERSION}"
          ERRORS=0
          for PKG in server/package.json web/package.json cli/package.json mcp/package.json; do
            if [ -f "$PKG" ]; then
              PKG_VERSION=$(node -p "require('./$PKG').version")
              echo "$PKG: v${PKG_VERSION}"
              if [ "$PKG_VERSION" != "$ROOT_VERSION" ]; then
                echo "ERROR: $PKG version (${PKG_VERSION}) does not match VERSION (${ROOT_VERSION})"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "Version consistency check FAILED with ${ERRORS} error(s)"
            exit 1
          fi
          echo "All versions are consistent"

  smoke-test:
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: node src/tests/smoke-test.js
        working-directory: server
