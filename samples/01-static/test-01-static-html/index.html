<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>静态页面测试</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
    h1 { color: #333; }
    .card { background: #f5f5f5; padding: 20px; border-radius: 8px; margin: 20px 0; }
    .ok { color: #2e7d32; font-weight: bold; }
  </style>
</head>
<body>
  <h1>静态页面测试</h1>
  <div class="card">
    <p>这是一个纯静态 HTML 页面，没有构建步骤，没有后端服务。</p>
    <p class="ok">✅ 如果你看到这个页面，说明静态页面发布成功。</p>
  </div>
  <div class="card">
    <h2>测试项目</h2>
    <ul>
      <li>HTML 结构</li>
      <li>CSS 样式</li>
      <li>JavaScript 交互</li>
    </ul>
  </div>
  <script>
    document.querySelector('h1').addEventListener('click', function() {
      this.style.color = this.style.color === 'red' ? '#333' : 'red';
    });
  </script>
</body>
</html>
