<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 钱包演示 - DemoGo</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.9.0/dist/ethers.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1f2937;
            text-align: center;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6b7280;
            text-align: center;
            margin-bottom: 30px;
        }
        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tag {
            background: #ede9fe;
            color: #7c3aed;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        .wallet-info {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }
        .wallet-info.visible {
            display: block;
        }
        .wallet-info h3 {
            color: #374151;
            margin-bottom: 15px;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #6b7280;
        }
        .info-value {
            color: #111827;
            font-weight: 600;
            font-family: monospace;
        }
        .status {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #dcfce7;
            border: 1px solid #22c55e;
            border-radius: 8px;
            color: #166534;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.7);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🔗 Web3 钱包演示</h1>
            <p class="subtitle">基于 ethers.js 的前端演示</p>

            <div class="tags">
                <span class="tag">Web3</span>
                <span class="tag">ethers.js</span>
                <span class="tag">DemoGo</span>
            </div>

            <button class="btn btn-primary" id="connectBtn">
                连接钱包
            </button>

            <button class="btn btn-secondary" id="generateBtn">
                生成演示钱包
            </button>

            <div class="wallet-info" id="walletInfo">
                <h3>💼 钱包信息</h3>
                <div class="info-item">
                    <span class="info-label">地址</span>
                    <span class="info-value" id="walletAddress">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">私钥</span>
                    <span class="info-value" id="walletPrivateKey">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">余额</span>
                    <span class="info-value">0.0 ETH</span>
                </div>
            </div>

            <div class="status">
                ✅ 由 DemoGo 部署的 Web3 前端应用
            </div>
        </div>

        <div class="footer">
            DemoGo 完全支持 Web3 前端应用部署！
        </div>
    </div>

    <script>
        let wallet = null;

        document.getElementById('generateBtn').addEventListener('click', () => {
            const randomWallet = ethers.Wallet.createRandom();
            wallet = randomWallet;
            
            document.getElementById('walletAddress').textContent = 
                randomWallet.address.substring(0, 10) + '...' + randomWallet.address.substring(32);
            document.getElementById('walletPrivateKey').textContent = 
                randomWallet.privateKey.substring(0, 10) + '...';
            
            document.getElementById('walletInfo').classList.add('visible');
        });

        document.getElementById('connectBtn').addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    alert('已连接: ' + accounts[0]);
                } catch (err) {
                    console.error(err);
                }
            } else {
                alert('请先安装 MetaMask 等钱包插件！');
            }
        });
    </script>
</body>
</html>
